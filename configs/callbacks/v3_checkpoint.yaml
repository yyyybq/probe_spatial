# v3 specific: save every 5 epochs, allow all improvements (save_top_k=-1), no early stopping
model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "epoch_{epoch:03d}"
  monitor: "val/loss"
  verbose: False
  save_last: True
  save_top_k: -1  # save all improvements, not just top-1
  mode: "min"
  auto_insert_metric_name: False
  save_weights_only: False
  every_n_epochs: 5  # save checkpoint every 5 epochs
  save_on_train_epoch_end: null

early_stopping: null  # disable early stopping for v3 (train to max_epochs)

model_summary:
  max_depth: -1

rich_progress_bar:
  refresh_rate: 1
  leave: False
